<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mohammad Sohel Hossain - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #050f08; 
            --yt-red: #ff0000;
            --deep-blue: #002b53;
            --glow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ১. প্রোফাইল সেকশন (৮০px - একদম উপরে) */
        .profile-container {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--deep-blue);
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: var(--glow);
            z-index: 10;
        }

        .user-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            background: url('https://ui-avatars.com/api/?name=Sohel+Hossain&background=00f2ff&color=000');
            background-size: cover;
        }

        .user-text h2 {
            margin: 0;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .user-text p {
            margin: 2px 0 0;
            font-size: 10px;
            color: var(--neon-blue);
            font-weight: bold;
        }

        /* ২. ইউটিউব সেকশন (১৬০px) */
        .youtube-section {
            padding: 15px 20px;
            height: 160px;
        }

        .yt-btn {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a0000;
            border: 3px solid var(--yt-red);
            border-radius: 20px;
            text-decoration: none;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            transition: 0.3s;
        }

        .yt-btn i {
            font-size: 80px; /* আইকন বড় করা হয়েছে */
            color: var(--yt-red);
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        .yt-btn span {
            color: white;
            font-weight: bold;
            font-size: 18px;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        /* ৩. অ্যাপ গ্রিড (৩০০px এলাকা) */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px 20px;
            flex: 1;
            align-content: start;
        }

        .app-card {
            height: 85px; /* আপনার চাহিদা অনুযায়ী উচ্চতা */
            background: var(--deep-blue);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(0, 242, 255, 0.2);
            transition: all 0.2s ease;
        }

        .app-card:active {
            transform: scale(0.92);
            background: #003a70;
            box-shadow: var(--glow);
        }

        .app-card i {
            font-size: 30px; /* আইকন সাইজ ৩০px */
            margin-bottom: 8px;
        }

        .app-card span {
            font-size: 10px;
            font-weight: 500;
            text-align: center;
        }

        /* ফাঁকা জায়গা (Margin) */
        .spacer {
            flex: 1;
        }

        .footer-line {
            height: 3px;
            background: var(--neon-blue);
            box-shadow: var(--glow);
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="user-details">
            <div class="avatar"></div>
            <div class="user-text">
                <h2>MOHAMMAD SOHEL HOSSAIN</h2>
                <p><i class="fas fa-check-circle"></i> PREMIUM USER</p>
            </div>
        </div>
        <i class="fas fa-cog" style="color: var(--neon-blue); font-size: 20px;"></i>
    </div>

    <div class="youtube-section">
        <a href="intent://www.youtube.com/#Intent;package=com.google.android.youtube;scheme=https;end" class="yt-btn">
            <i class="fab fa-youtube"></i>
            <span>YOUTUBE</span>
        </a>
    </div>

    <div class="app-grid">
        <a href="https://google.com" class="app-card">
            <i class="fab fa-google" style="color: #4285F4;"></i>
            <span>Google</span>
        </a>
        <a href="fb://facewebmodal/f?href=https://facebook.com" class="app-card">
            <i class="fab fa-facebook" style="color: #1877F2;"></i>
            <span>Facebook</span>
        </a>
        <a href="https://gemini.google.com" class="app-card">
            <i class="fas fa-wand-magic-sparkles" style="color: #8E75FF;"></i>
            <span>Gemini AI</span>
        </a>

        <a href="https://tiktok.com" class="app-card">
            <i class="fab fa-tiktok" style="color: #FF0050;"></i>
            <span>TikTok</span>
        </a>
        <a href="whatsapp://send?text=Hi" class="app-card">
            <i class="fab fa-whatsapp" style="color: #25D366;"></i>
            <span>WhatsApp</span>
        </a>
        <a href="https://quran.com" class="app-card">
            <i class="fas fa-book-quran" style="color: #FFD700;"></i>
            <span>Al-Quran</span>
        </a>

        <a href="tel:" class="app-card">
            <i class="fas fa-phone-alt" style="color: #34C759;"></i>
            <span>Dialer</span>
        </a>
        <a href="intent:#Intent;action=android.settings.WIFI_SETTINGS;end" class="app-card">
            <i class="fas fa-wifi" style="color: var(--neon-blue);"></i>
            <span>WiFi Setup</span>
        </a>
        <a href="https://github.com/new" class="app-card">
            <i class="fab fa-github" style="color: #FFF;"></i>
            <span>GitHub New</span>
        </a>
    </div>

    <div class="spacer"></div>
    <div class="footer-line"></div>

</body>
</html>
