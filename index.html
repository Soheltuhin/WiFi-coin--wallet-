<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohammad Sohel Hossain - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #010409; 
            --yt-red: #ff0000;
            --card-bg: rgba(13, 17, 23, 0.8); 
            --glow-cyan: 0 0 10px rgba(0, 242, 255, 0.5);
            --border-color: rgba(240, 246, 252, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: linear-gradient(180deg, #010409 0%, #0d1117 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- 1. Profile Header --- */
        .profile-header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(1, 4, 9, 0.9);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            background: #0d1117;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: var(--neon-blue);
            box-shadow: var(--glow-cyan);
            position: relative;
        }
        
        .avatar::after {
            content: '';
            position: absolute;
            top: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background-color: #ff4444;
            border-radius: 50%;
            border: 1px solid var(--bg-dark);
        }

        .user-text h2 {
            margin: 0;
            font-size: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .user-text p {
            margin: 2px 0 0;
            font-size: 11px;
            color: #8b949e;
        }
        
        .user-text p i {
            color: #3fb950;
            margin-right: 3px;
        }

        .settings-icon {
            color: #8b949e;
            font-size: 20px;
            cursor: pointer;
        }

        /* --- 2. YouTube Banner --- */
        .youtube-section {
            padding: 20px;
            box-sizing: border-box;
        }

        .yt-card {
            width: 100%;
            height: 150px;
            background: #000;
            border: 2px solid var(--yt-red);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            text-decoration: none;
        }

        .yt-card i.fa-youtube {
            font-size: 60px;
            color: var(--yt-red);
        }

        .yt-card .yt-text {
            color: white;
            font-weight: bold;
            font-size: 20px;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .subscribe-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: var(--yt-red);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        /* --- 3. App Grid --- */
        .app-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px 20px;
            padding-bottom: 80px; 
            overflow-y: auto;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: white;
        }

        .app-card:active {
            transform: scale(0.95);
        }

        /* Multicolor Glow Effects */
        .app-card:nth-child(1) { box-shadow: 0 0 15px rgba(66, 133, 244, 0.4); } 
        .app-card:nth-child(2) { box-shadow: 0 0 15px rgba(24, 119, 242, 0.4); } 
        .app-card:nth-child(3) { box-shadow: 0 0 15px rgba(142, 117, 255, 0.4); } 
        .app-card:nth-child(4) { box-shadow: 0 0 15px rgba(255, 0, 80, 0.4); } 
        .app-card:nth-child(5) { box-shadow: 0 0 15px rgba(37, 211, 102, 0.4); } 
        .app-card:nth-child(6) { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); } 
        .app-card:nth-child(7) { box-shadow: 0 0 15px rgba(52, 199, 89, 0.4); } 
        .app-card:nth-child(8) { box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); } 
        .app-card:nth-child(9) { box-shadow: 0 0 15px rgba(240, 246, 252, 0.2); } 

        .app-card i {
            font-size: 30px;
            margin-bottom: 8px;
        }

        .app-card span {
            font-size: 11px;
            font-weight: 500;
        }

        /* --- 4. Login Overlay --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .overlay.active {
            display: flex;
        }

        .login-popup {
            background: rgba(22, 27, 34, 0.95);
            width: 85%;
            max-width: 320px;
            border-radius: 12px;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.6);
            padding: 20px;
            position: relative;
            animation: popupSlideIn 0.3s ease-out;
        }
        
        @keyframes popupSlideIn {
            from { transform: translateY(-20px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: var(--neon-blue);
        }

        .popup-header h3 {
            margin: 0;
            font-size: 16px;
        }

        .close-popup {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 18px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: #c9d1d9;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            font-size: 13px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 5px rgba(0, 242, 255, 0.3);
        }

        .login-submit-btn {
            width: 100%;
            padding: 10px;
            background-color: #21262d;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            transition: background 0.2s;
        }
        
        .login-submit-btn:hover {
            background-color: rgba(0, 242, 255, 0.1);
        }

        .forgot-pass {
            text-align: center;
            margin-top: 10px;
            font-size: 10px;
        }
        
        .forgot-pass a {
            color: #8b949e;
            text-decoration: none;
        }

        /* --- 5. WiFi System Message --- */
        .system-message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 101;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .system-message-overlay.active {
            display: flex;
        }

        .system-card {
            background: rgba(22, 27, 34, 0.98);
            border: 1px solid #3fb950;
            border-radius: 8px;
            padding: 15px;
            width: 100%;
            max-width: 280px;
            text-align: center;
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.3);
            animation: popupSlideIn 0.3s ease-out;
        }

        .system-card h4 {
            margin: 0 0 10px;
            color: #3fb950;
            font-size: 14px;
        }

        .system-card p {
            margin: 0 0 15px;
            color: #c9d1d9;
            font-size: 12px;
            line-height: 1.4;
        }

        .system-ok-btn {
            background: #21262d;
            border: 1px solid #3fb950;
            color: #3fb950;
            padding: 6px 20px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <div class="profile-header">
        <div class="user-info" id="userInfo">
            <div class="avatar">SH</div>
            <div class="user-text">
                <h2>MOHAMMAD SOHEL HOSSAIN</h2>
                <p><i class="fas fa-check-circle"></i> PREMIUM USER</p>
            </div>
        </div>
        <i class="fas fa-cog settings-icon" onclick="openPhoneSettings()"></i>
    </div>

    <div class="youtube-section">
        <a href="https://www.youtube.com" target="_blank" class="yt-card">
            <button class="subscribe-btn">
                Subscribe <i class="fas fa-bell"></i>
            </button>
            <i class="fab fa-youtube"></i>
            <div class="yt-text">YOUTUBE</div>
        </a>
    </div>

    <div class="app-grid">
        <a href="https://google.com" target="_blank" class="app-card">
            <i class="fab fa-google" style="color: #4285F4;"></i>
            <span>Google</span>
        </a>
        <a href="https://facebook.com" target="_blank" class="app-card">
            <i class="fab fa-facebook-f" style="color: #1877F2;"></i>
            <span>Facebook</span>
        </a>
        <a href="https://gemini.google.com" target="_blank" class="app-card">
            <i class="fas fa-wand-magic-sparkles" style="color: #8E75FF;"></i>
            <span>Gemini AI</span>
        </a>

        <a href="https://tiktok.com" target="_blank" class="app-card">
            <i class="fab fa-tiktok" style="color: #FF0050;"></i>
            <span>TikTok</span>
        </a>
        <a href="https://whatsapp.com" target="_blank" class="app-card">
            <i class="fab fa-whatsapp" style="color: #25D366;"></i>
            <span>WhatsApp</span>
        </a>
        <a href="https://quran.com" target="_blank" class="app-card">
            <i class="fas fa-book-quran" style="color: #FFD700;"></i>
            <span>Al-Quran</span>
        </a>

        <a href="tel:0123456789" class="app-card">
            <i class="fas fa-phone-alt" style="color: #34C759;"></i>
            <span>Dialer</span>
        </a>
        <a href="#" class="app-card" id="wifiBtn">
            <i class="fas fa-wifi" style="color: var(--neon-blue);"></i>
            <span>WiFi Setup</span>
        </a>
        <a href="https://github.com/new" target="_blank" class="app-card">
            <i class="fab fa-github" style="color: #F0F6FC;"></i>
            <span>GitHub New</span>
        </a>
    </div>

    <div class="overlay" id="loginOverlay">
        <div class="login-popup">
            <div class="popup-header">
                <h3>Profile Login</h3>
                <button class="close-popup" id="closeLogin">&times;</button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="your.email@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-submit-btn">Login</button>
            </form>
            <div class="forgot-pass">
                <a href="#">Forgot Password?</a>
            </div>
        </div>
    </div>

    <div class="system-message-overlay" id="wifiOverlay">
        <div class="system-card">
            <h4>System Message:</h4>
            <p>This feature is currently being updated. Please check back later.</p>
            <button class="system-ok-btn" id="closeWifi">OK</button>
        </div>
    </div>

    <script>
        const userInfo = document.getElementById('userInfo');
        const loginOverlay = document.getElementById('loginOverlay');
        const closeLogin = document.getElementById('closeLogin');
        const loginForm = document.getElementById('loginForm');

        const wifiBtn = document.getElementById('wifiBtn');
        const wifiOverlay = document.getElementById('wifiOverlay');
        const closeWifi = document.getElementById('closeWifi');

        // 1. Open Login Overlay on Profile Click
        userInfo.addEventListener('click', () => {
            loginOverlay.classList.toggle('active');
        });

        closeLogin.addEventListener('click', () => {
            loginOverlay.classList.remove('active');
        });

        // Redirect to Play Store on Login Submission
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(email && pass) {
                window.location.href = "https://play.google.com/store/apps";
            }
        });

        // 2. WiFi System Message
        wifiBtn.addEventListener('click', (e) => {
            e.preventDefault();
            wifiOverlay.classList.add('active');
        });

        closeWifi.addEventListener('click', () => {
            wifiOverlay.classList.remove('active');
        });

        // 3. Settings Icon Function
        function openPhoneSettings() {
            alert("This icon would link to the official Android phone settings.");
        }
    </script>
</body>
            </html>
