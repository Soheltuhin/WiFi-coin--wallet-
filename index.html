<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - WiFi Data Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --bg-dark: #0b1c11;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at top right, #384f42, transparent 50%),
                radial-gradient(circle at top left, #384f42, transparent 50%),
                radial-gradient(circle at bottom left, #23432f, transparent 40%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* হেডার */
        .header-top {
            width: 100%;
            height: 65px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-top img { height: 24px; }

        .number-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid white;
            color: var(--neon-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        /* লগইন সেকশন */
        #login-section {
            text-align: center;
            margin-top: 120px;
            animation: fadeIn 0.8s ease;
        }

        .login-btn {
            margin-top: 25px;
            padding: 14px 40px;
            background: white;
            color: #222;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .login-btn:hover { transform: scale(1.05); background: #f0f0f0; }

        /* ড্যাশবোর্ড কন্টেইনার */
        #dashboard { display: none; width: 100%; }

        .loading-box {
            background: white;
            margin: 40px auto;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            width: 85%;
            max-width: 400px;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* প্রোফাইল হেডার */
        .profile-card {
            width: 100%;
            padding: 20px;
            background: rgba(0, 43, 83, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-blue);
            box-sizing: border-box;
        }

        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--neon-blue); }
        .user-text h2 { margin: 0; font-size: 14px; letter-spacing: 0.5px; }
        .user-text p { margin: 2px 0 0; font-size: 10px; color: var(--neon-blue); font-weight: bold; }

        /* ইউটিউব সেকশন */
        .yt-banner {
            width: 90%;
            margin: 20px auto;
            background: #1a0000;
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            display: block;
            box-shadow: 0 0 15px rgba(255,0,0,0.2);
        }

        /* অ্যাপ গ্রিড */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 92%;
            margin: 10px auto 40px;
        }

        .app-card {
            background: #001a33;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 18px 5px;
            text-align: center;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.2s;
        }

        .app-card:active { transform: scale(0.9); border-color: var(--neon-blue); }
        .app-card i { font-size: 30px; margin-bottom: 10px; }
        .app-card span { font-size: 10px; font-weight: 500; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-top">
        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_light_color_92x30dp.png" alt="Google">
        <div class="number-circle">0</div>
    </div>

    <div id="login-section">
        <h2 style="font-weight: 400;">Google Account Login</h2>
        <p style="opacity: 0.7; font-size: 14px;">Verify your credentials to continue</p>
        <button class="login-btn" onclick="handleLogin()">Login with Google</button>
    </div>

    <div id="dashboard">
        <div id="loader" class="loading-box">
            <h3 style="color: #2e7d32; margin: 0;">Success!</h3>
            <p style="margin: 10px 0; font-size: 15px;">WiFi Data Storage Loading...</p>
            <i class="fas fa-circle-notch fa-spin" style="color: #007aff; font-size: 24px;"></i>
        </div>

        <div id="content" style="display:none;">
            <div class="profile-card">
                <div class="user-info">
                    <img src="https://ui-avatars.com/api/?name=Sohel+Hossain&background=007aff&color=fff" class="avatar">
                    <div class="user-text">
                        <h2>MOHAMMAD SOHEL HOSSAIN</h2>
                        <p><i class="fas fa-check-circle"></i> PREMIUM USER</p>
                    </div>
                </div>
                <i class="fas fa-cog" style="color: #bbb;"></i>
            </div>

            <a href="https://www.youtube.com" target="_blank" class="yt-banner">
                <i class="fab fa-youtube" style="font-size: 45px; color: #ff0000;"></i>
                <div style="color: #ff0000; font-weight: bold; margin-top: 8px; font-size: 14px;">OPEN YOUTUBE</div>
            </a>

            <div class="app-grid">
                <a href="https://google.com" target="_blank" class="app-card">
                    <i class="fab fa-google" style="color: #4285F4;"></i>
                    <span>Google</span>
                </a>
                <a href="https://facebook.com" target="_blank" class="app-card">
                    <i class="fab fa-facebook" style="color: #1877F2;"></i>
                    <span>Facebook</span>
                </a>
                <a href="https://gemini.google.com/" target="_blank" class="app-card">
                    <i class="fas fa-wand-magic-sparkles" style="color: #8E75FF;"></i>
                    <span>Gemini AI</span>
                </a>
                <a href="https://www.tiktok.com" target="_blank" class="app-card">
                    <i class="fab fa-tiktok" style="color: #fff;"></i>
                    <span>TikTok</span>
                </a>
                <a href="https://web.whatsapp.com" target="_blank" class="app-card">
                    <i class="fab fa-whatsapp" style="color: #25D366;"></i>
                    <span>WhatsApp</span>
                </a>
                <a href="https://quran.com" target="_blank" class="app-card">
                    <i class="fas fa-book-quran" style="color: #FFD700;"></i>
                    <span>Al-Quran</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            // ১. গুগল ওপেন করা
            window.open("https://accounts.google.com/", "_blank");

            // ২. স্ক্রিন সুইচ করা
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // ৩. ১.৫ সেকেন্ড পর মেইন কন্টেন্ট লোড করা
            setTimeout(function() {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            }, 1500);
        }
    </script>

</body>
</html>
