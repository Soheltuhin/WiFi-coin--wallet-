<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - WiFi Data Loading</title>
    <style>
        /* ১. ব্যাকগ্রাউন্ড এবং বডি স্টাইল (আপনার ছবি অনুযায়ী) */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b1c11; 
            background-image: 
                radial-gradient(circle at top right, #384f42, transparent 50%),
                radial-gradient(circle at top left, #384f42, transparent 50%),
                radial-gradient(circle at bottom left, #23432f, transparent 40%);
            overflow: hidden;
            flex-direction: column;
        }

        /* ২. উপরের লোগো এবং নীল সংখ্যা সার্কেল */
        .header {
            width: 100%;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            position: absolute;
            top: 0;
            box-sizing: border-box;
        }

        .header .G{
            width: 40px;
            height: 40px;
        }

        .header .number-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
            color: #007aff; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
        }

        /* ৩. লগইন বাটন সেকশন */
        #login-section {
            text-align: center;
            color: white;
            z-index: 10;
        }

        .login-btn {
            margin-top: 20px;
            padding: 15px 35px;
            background-color: #ffffff; 
            color: #333;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }

        /* ৪. ড্যাশবোর্ড বক্স (ছবি অনুযায়ী সাদা বক্স) */
        #dashboard {
            display: none; /* শুরুতে এটি লুকানো থাকবে */
            z-index: 20;
        }

        .notification-box {
            background-color: white;
            border-radius: 15px;
            padding: 40px 30px;
            text-align: center;
            width: 85%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .notification-box .thank-you {
            color: #008000; /* গাঢ় সবুজ */
            font-weight: bold;
            font-size: 26px;
            margin-bottom: 15px;
        }

        .notification-box .loading-text {
            color: #333;
            font-size: 18px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .notification-box .wait-text {
            color: #777;
            font-size: 14px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://www.gstatic.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google" class="google-logo">
        <div class="number-circle">0</div>
    </div>

    <div id="login-section">
        <h2 style="margin-bottom: 10px;">Google Account Login</h2>
        <p style="opacity: 0.8;">Click below to verify your access</p>
        <button class="login-btn" id="loginBtn">Login with Google</button>
    </div>

    <div id="dashboard">
        <div class="notification-box">
            <div class="thank-you">Thank you!</div>
            <div class="loading-text">Your WiFi data storage is being loading...</div>
            <div class="wait-text">Verifying credentials, please wait...</div>
        </div>
    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const loginSection = document.getElementById('login-section');
        const dashboard = document.getElementById('dashboard');

        // ধাপ ৪: ক্লিক করার পর কি হবে
        loginBtn.addEventListener('click', function() {
            // ১. নতুন ট্যাবে গুগল ওপেন হবে
            window.open("https://accounts.google.com/", "_blank");

            // ২. ঠিক ৩ সেকেন্ড অপেক্ষা করবে
            setTimeout(function() {
                // ৩. লগইন বাটন সরিয়ে ড্যাশবোর্ড বক্সটি দেখাবে
                loginSection.style.display = 'none';
                dashboard.style.display = 'block';
            }, 3000); 
        });
    </script>

</body>
</html>
